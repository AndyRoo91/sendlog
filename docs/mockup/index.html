<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>sendlog · session form redesign</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; }
    #root { height: 100%; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="system.jsx"></script>
  <script type="text/babel" src="variants.jsx"></script>
  <script type="text/babel" src="v1-states.jsx"></script>

  <script type="text/babel">
    // wrap each variant in an iOS device frame, dark status bar (because our top strip is ink-black)
    function Phone({ children, light = false }) {
      return (
        <IOSDevice width={402} height={874} dark={!light}>
          {children}
        </IOSDevice>
      );
    }

    function PhoneLight({ children }) {
      return (
        <IOSDevice width={402} height={874} dark={false}>
          {children}
        </IOSDevice>
      );
    }

    function App() {
      return (
        <DesignCanvas>
          <DCSection
            id="context"
            title="Before / After context"
            subtitle="Where the app is today, and the visual system this redesign commits to"
          >
            <DCArtboard id="current" label="A · Current state (today)" width={402} height={874}>
              <CurrentState />
            </DCArtboard>
            <DCArtboard id="mood" label="B · Aesthetic system" width={402} height={874}>
              <MoodBoard />
            </DCArtboard>
          </DCSection>

          <DCSection
            id="v1-deepdive"
            title="V1 · Tick Sheet — deep dive"
            subtitle="You picked this one. Here are the states the agent needs to build."
          >
            <DCArtboard id="v1-rec" label="A · RECOMMENDED — Tick Sheet + recents on top" width={402} height={874}>
              <Phone><V1_Recommended /></Phone>
            </DCArtboard>
            <DCArtboard id="v1-empty" label="B · Empty state — first send of session" width={402} height={874}>
              <Phone><V1_Empty /></Phone>
            </DCArtboard>
            <DCArtboard id="v1-lead" label="C · LEAD mode — Ewbank + route name + falls" width={402} height={874}>
              <Phone><V1_Lead /></Phone>
            </DCArtboard>
            <DCArtboard id="v1-detail" label="D · Detail sheet — long-press a chip" width={402} height={874}>
              <Phone><V1_DetailSheet /></Phone>
            </DCArtboard>
            <DCArtboard id="v1-after" label="E · After-commit — the satisfying moment" width={402} height={874}>
              <Phone><V1_AfterCommit /></Phone>
            </DCArtboard>
            <DCArtboard id="v1-summary" label="F · End of session — tick certificate" width={402} height={874}>
              <Phone><V1_Summary /></Phone>
            </DCArtboard>
          </DCSection>

          <DCSection
            id="form-variants"
            title="Session-form variants (for reference)"
            subtitle="The 5 directions explored — kept here for context."
          >
            <DCArtboard id="v1" label="1 · TICK SHEET — grade pyramid, 2-tap" width={402} height={874}>
              <Phone><V1_TickSheet /></Phone>
            </DCArtboard>
            <DCArtboard id="v2" label="2 · SWIPE STACK — Tinder for sends" width={402} height={874}>
              <Phone><V2_SwipeStack /></Phone>
            </DCArtboard>
            <DCArtboard id="v3" label="3 · DIAL — combo-lock thumb spin" width={402} height={874}>
              <Phone><V3_Dial /></Phone>
            </DCArtboard>
            <DCArtboard id="v4" label="4 · VOICE — hold & holler" width={402} height={874}>
              <Phone><V4_Voice /></Phone>
            </DCArtboard>
            <DCArtboard id="v5" label="5 · REMIX — one-tap repeat" width={402} height={874}>
              <Phone><V5_Recent /></Phone>
            </DCArtboard>
          </DCSection>

          <DCPostIt top={0} left={60} rotate={-3} width={260}>
            5 directions for the same problem: log a send in &lt; 5 seconds. Read the SPEC.md for handoff notes →
          </DCPostIt>
        </DesignCanvas>
      );
    }

    // wait for all babel scripts to settle, then mount
    setTimeout(() => {
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    }, 100);
  </script>
</body>
</html>
