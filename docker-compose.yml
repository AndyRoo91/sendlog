services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - climbing-data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/climbing.db
      - PHOTOS_DIR=/app/data/photos
      # Set in the host env or a .env file next to this compose file.
      - SECRET_KEY=${SECRET_KEY:-}                    # signs session cookies; unset = logouts on restart
      - ANDY_USERNAME=${ANDY_USERNAME:-andy}          # seeded first-run admin username
      - ANDY_PASSWORD=${ANDY_PASSWORD:-changeme}      # seeded first-run admin password
    restart: unless-stopped

volumes:
  climbing-data:
