services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - climbing-data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/climbing.db
      - PHOTOS_DIR=/app/data/photos
    restart: unless-stopped

volumes:
  climbing-data:
